# Pythia-160M (matches your original notebook setup for verification)
model:
  name: "EleutherAI/pythia-160m"
  trust_remote_code: false
  dtype: "bfloat16"

extraction:
  batch_size: 64
  max_length: 256
  num_layers_to_probe: 5

data:
  paths:
    - "data/numpred.train"
    - "data/numpred.val"
    - "data/numpred.test"
  max_examples: 30000
  val_frac: 0.4
  inter_frac: 0.4
  seed: 42

probes:
  hidden_dim: 256
  epochs: 50
  lr: 1.0e-3
  weight_decay: 0.01
  batch_size: 256

mka:
  knn_k: 10
  lambda_reg: 0.1

hessian:
  top_n: 20
  bottom_n: 20
  max_iter: 100
  tol: 1.0e-3

interventions:
  inlp: {num_iters: 10}
  rlace: {rank: 1, steps: 500}
  alterrep: {alpha: 1.0}
  fgsm: {epsilon: 0.5}
  pgd: {epsilon: 0.5, steps: 10, alpha: 0.1}

output:
  results_dir: "results/pythia-160m"
  cache_dir: "cache/pythia-160m"
  seed: 42
